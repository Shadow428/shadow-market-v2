kind = "web"
previewPath = "/"
title = "Shadow Marketplace"
version = "1.0.0"
id = "artifacts/shadow-marketplace"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23051

[services.development]
run = "pnpm --filter @workspace/shadow-marketplace run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shadow-marketplace", "run", "build" ]
publicDir = "artifacts/shadow-marketplace/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23051"
BASE_PATH = "/"
